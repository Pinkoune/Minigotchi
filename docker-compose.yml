# Runs the save-sync API (SQLite by default). Uncomment the db service and
# DATABASE_URL to switch to Postgres — no code change needed.
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - api-data:/srv/data
    # environment:
    #   DATABASE_URL: postgresql+psycopg2://minigotchi:minigotchi@db:5432/minigotchi
